<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TichPhong Share</title>
<style>
  :root {
    --accent: #047857;
    --accent-hover: #065f46;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1e;
    --border: #2c2c2e;
    --text: #f5f5f7;
    --text-secondary: #8e8e93;
    --success: #30d158;
    --danger: #ff453a;
    --blue: #0a84ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #10b981);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .status {
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px; margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Content */
  .content { padding: 16px 20px 100px; display: flex; flex-direction: column; gap: 20px; }

  /* Section */
  .section {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .section-header {
    padding: 16px 16px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .section-title { font-size: 15px; font-weight: 600; }
  .section-badge {
    margin-left: auto; background: var(--accent);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
  }

  /* File list */
  .file-list { padding: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border-radius: 12px;
    transition: background 0.15s;
  }
  .file-item:active { background: var(--surface-2); }
  .file-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface-2); display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-size { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .file-action {
    background: var(--accent); color: #fff;
    border: none; padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; transition: background 0.15s;
  }
  .file-action:active { background: var(--accent-hover); }

  /* Empty state */
  .empty {
    padding: 40px 20px; text-align: center;
    color: var(--text-secondary);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 13px; line-height: 1.5; }

  /* Upload button */
  .upload-area {
    padding: 16px;
  }
  .upload-btn {
    width: 100%; padding: 14px;
    background: var(--surface-2); border: 2px dashed var(--border);
    border-radius: 14px; color: var(--text);
    font-size: 15px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .upload-btn:active { border-color: var(--accent); background: rgba(4,120,87,0.1); }
  .upload-btn input { display: none; }

  /* Upload progress */
  .upload-status {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid var(--border);
  }
  .upload-status .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .upload-status-text { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .upload-result {
    padding: 12px 16px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid var(--border);
  }
  .upload-result.accepted { color: var(--success); }
  .upload-result.rejected { color: var(--danger); }

  /* Disconnected overlay */
  .disconnected {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 40px;
  }
  .disconnected .icon { font-size: 64px; opacity: 0.3; }
  .disconnected h2 { font-size: 20px; font-weight: 700; }
  .disconnected p { color: var(--text-secondary); text-align: center; font-size: 14px; line-height: 1.6; }
  .disconnected .retry-btn {
    margin-top: 8px; padding: 12px 28px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 12px; font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <!-- Disconnected overlay -->
  <div class="disconnected" id="disconnected-view" style="display:none">
    <div class="icon">🔗</div>
    <h2>Mất kết nối</h2>
    <p>Kết nối với PC đã bị ngắt.<br>Vui lòng kiểm tra mạng và thử lại.</p>
    <button class="retry-btn" onclick="connectWebSocket()">Kết nối lại</button>
  </div>

  <!-- Main UI -->
  <div id="main-view">
    <div class="header">
      <div class="header-top">
        <div class="header-icon">🔗</div>
        <div>
          <h1>TichPhong Share</h1>
          <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Đang kết nối...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- Download section: Files from PC -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:rgba(4,120,87,0.15);color:var(--accent)">📥</div>
          <span class="section-title">File từ PC</span>
          <span class="section-badge" id="file-count" style="display:none">0</span>
        </div>
        <div id="file-list" class="file-list">
          <div class="empty">
            <div class="empty-icon">📂</div>
            <p>Chưa có file nào.<br>Hãy chọn file trên PC để chia sẻ.</p>
          </div>
        </div>
      </div>

      <!-- Upload section: Send to PC -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon" style="background:rgba(10,132,255,0.15);color:var(--blue)">📤</div>
          <span class="section-title">Gửi file lên PC</span>
        </div>
        <div class="upload-area">
          <label class="upload-btn" id="upload-btn">
            <span>📎</span> Chọn file để gửi
            <input type="file" id="file-input" multiple>
          </label>
        </div>
        <div id="upload-results"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = '{{TOKEN}}';
const HOST = '{{HOST}}';
const WS_URL = `ws://${HOST}/ws?token=${TOKEN}`;
const API_BASE = `http://${HOST}`;

let ws = null;
let reconnectTimer = null;

// ─── WebSocket ───────────────────────────────────────────

function connectWebSocket() {
  if (ws && ws.readyState === WebSocket.OPEN) return;

  document.getElementById('disconnected-view').style.display = 'none';
  document.getElementById('status-text').textContent = 'Đang kết nối...';
  document.getElementById('status-dot').style.background = '#ff9f0a';

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('status-text').textContent = 'Đã kết nối với PC';
    document.getElementById('status-dot').style.background = '#30d158';
    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
    // Fetch initial file list
    fetchFiles();
  };

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch(err) {
      console.error('WS parse error:', err);
    }
  };

  ws.onclose = () => {
    document.getElementById('disconnected-view').style.display = 'flex';
    document.getElementById('status-text').textContent = 'Mất kết nối';
    document.getElementById('status-dot').style.background = '#ff453a';
    // Auto-reconnect every 3s
    if (!reconnectTimer) {
      reconnectTimer = setInterval(() => connectWebSocket(), 3000);
    }
  };

  ws.onerror = () => ws.close();
}

function handleEvent(event) {
  switch(event.type) {
    case 'files_available':
      renderFiles(event.files || []);
      break;
    case 'upload_accepted':
      updateUploadResult(event.id, true);
      break;
    case 'upload_rejected':
      updateUploadResult(event.id, false);
      break;
  }
}

// ─── File List (Download from PC) ────────────────────────

async function fetchFiles() {
  try {
    const res = await fetch(`${API_BASE}/qrc/files?token=${TOKEN}`);
    if (res.ok) {
      const files = await res.json();
      renderFiles(files);
    }
  } catch(e) { console.error('Fetch files error:', e); }
}

function renderFiles(files) {
  const container = document.getElementById('file-list');
  const badge = document.getElementById('file-count');

  if (!files || files.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📂</div>
        <p>Chưa có file nào.<br>Hãy chọn file trên PC để chia sẻ.</p>
      </div>`;
    badge.style.display = 'none';
    return;
  }

  badge.textContent = files.length;
  badge.style.display = 'inline';

  container.innerHTML = files.map(f => `
    <div class="file-item">
      <div class="file-icon">${getFileIcon(f.name)}</div>
      <div class="file-info">
        <div class="file-name">${escapeHtml(f.name)}</div>
        <div class="file-size">${formatSize(f.size)}</div>
      </div>
      <button class="file-action" onclick="downloadFile('${f.id}','${escapeHtml(f.name)}')">Tải về</button>
    </div>
  `).join('');
}

function downloadFile(id, name) {
  const a = document.createElement('a');
  a.href = `${API_BASE}/qrc/download/${id}?token=${TOKEN}`;
  a.download = name;
  a.click();
  showToast(`Đang tải: ${name}`);
}

// ─── Upload (Send to PC) ─────────────────────────────────

const uploadResults = {};

document.getElementById('file-input').addEventListener('change', async function() {
  const files = this.files;
  if (!files || files.length === 0) return;

  for (const file of files) {
    const uploadId = 'local-' + Math.random().toString(36).slice(2,10);
    addUploadStatus(uploadId, file.name, 'uploading');

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API_BASE}/qrc/upload?token=${TOKEN}`, {
        method: 'POST',
        body: formData,
      });
      if (res.ok) {
        addUploadStatus(uploadId, file.name, 'waiting');
      } else {
        addUploadStatus(uploadId, file.name, 'error');
      }
    } catch(e) {
      addUploadStatus(uploadId, file.name, 'error');
    }
  }

  // Reset input
  this.value = '';
});

function addUploadStatus(id, name, status) {
  const container = document.getElementById('upload-results');
  let el = document.getElementById(`upload-${id}`);

  if (!el) {
    el = document.createElement('div');
    el.id = `upload-${id}`;
    container.prepend(el);
  }

  if (status === 'uploading') {
    el.className = 'upload-status';
    el.innerHTML = `<div class="spinner"></div><span class="upload-status-text">Đang gửi: ${escapeHtml(name)}...</span>`;
  } else if (status === 'waiting') {
    el.className = 'upload-status';
    el.innerHTML = `<div class="spinner"></div><span class="upload-status-text">Đang chờ PC duyệt: ${escapeHtml(name)}</span>`;
  } else if (status === 'error') {
    el.className = 'upload-result rejected';
    el.innerHTML = `❌ Lỗi khi gửi: ${escapeHtml(name)}`;
    setTimeout(() => el.remove(), 5000);
  }
}

function updateUploadResult(id, accepted) {
  // Find any waiting upload and update it
  const container = document.getElementById('upload-results');
  const waitingItems = container.querySelectorAll('.upload-status');
  if (waitingItems.length > 0) {
    const el = waitingItems[0];
    if (accepted) {
      el.className = 'upload-result accepted';
      el.innerHTML = `✅ PC đã nhận file thành công!`;
    } else {
      el.className = 'upload-result rejected';
      el.innerHTML = `❌ PC đã từ chối file.`;
    }
    setTimeout(() => el.remove(), 4000);
  }
  showToast(accepted ? 'PC đã nhận file!' : 'PC đã từ chối file.');
}

// ─── Utilities ───────────────────────────────────────────

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊',
    ppt: '📊', pptx: '📊', txt: '📃', csv: '📊',
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️', bmp: '🖼️',
    mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬', webm: '🎬',
    mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵', ogg: '🎵',
    zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
    apk: '📱', exe: '⚙️', dmg: '💿', iso: '💿',
    html: '🌐', css: '🎨', js: '⚡', json: '📋',
  };
  return icons[ext] || '📄';
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ─── Init ────────────────────────────────────────────────

connectWebSocket();
</script>
</body>
</html>
